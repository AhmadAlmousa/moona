<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Moona — a bilingual shared shopping list.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Moona">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Moona</title>
  <link rel="manifest" href="manifest.json">

  <!--
    PWA install-prompt capture. Browsers fire `beforeinstallprompt` once when the
    app is installable (HTTPS, manifest, service worker, not already installed).
    We stash the event so Dart can trigger the native install dialog on demand
    (see lib/features/pwa/pwa_install_web.dart). `appinstalled` clears it.
  -->
  <script>
    window.moonaPwa = window.moonaPwa || { deferred: null, installed: false };
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.moonaPwa.deferred = e;
    });
    window.addEventListener('appinstalled', function () {
      window.moonaPwa.deferred = null;
      window.moonaPwa.installed = true;
    });
    // True only when the platform can show the native install dialog right now.
    window.moonaPwaCanInstall = function () {
      return !!(window.moonaPwa && window.moonaPwa.deferred);
    };
    // Triggers the stashed prompt; resolves to the user's choice
    // ("accepted" | "dismissed" | "unavailable"). One-shot: the event can only
    // be used once, so we drop it afterwards.
    window.moonaPwaPromptInstall = function () {
      var p = window.moonaPwa && window.moonaPwa.deferred;
      if (!p) return Promise.resolve("unavailable");
      window.moonaPwa.deferred = null;
      p.prompt();
      return p.userChoice.then(function (choice) {
        return (choice && choice.outcome) ? choice.outcome : "dismissed";
      }).catch(function () { return "dismissed"; });
    };
  </script>
</head>
<body>
  <!--
    Plain-HTML splash shown until Flutter paints its first frame. Doubles as a
    staleness probe: the console build marker tells us which bundle a browser
    actually loaded when debugging cache/service-worker issues.
  -->
  <div id="moona-splash"
       style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
              background:#161616;color:#6ee7a8;font-family:sans-serif;font-size:18px;">
    Loading Moona&hellip;
  </div>
  <script>
    console.log('Moona web build: 2026-06-11T11:30 (widget-web-fix)');
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('moona-splash');
      if (s) s.remove();
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
