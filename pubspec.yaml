name: moona
description: "Moona — bilingual shared shopping list."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  appwrite: ^25.0.0
  flutter_svg: ^2.3.0
  image_picker: ^1.2.2
  # Pinned to the 1.x line on purpose. flutter_contacts hardcodes
  # `IN_VISIBLE_GROUP = 1` in its query, which drops contacts not in a "visible
  # group" — common for synced/SIM contacts on Samsung/One UI, so getAll()
  # returns 0 there even with permission granted. 1.x exposes a config flag
  # (`includeNonVisibleOnAndroid`, set true in contact_picker.dart) to disable
  # that filter; 2.x removed the flag and bakes the filter in with no opt-out, so
  # the empty-list bug is unfixable from Dart on 2.x. Do NOT bump to 2.x without
  # replacing the read path (e.g. a native Contacts.CONTENT_URI query).
  # permission_handler drives the runtime permission + "Open settings" shortcut
  # (1.x has no openSettings()).
  flutter_contacts: ^1.1.9
  permission_handler: ^11.3.1
  # System contact picker (ACTION_PICK) kept as a convenience/fallback: it reads
  # only the chosen contact via a temporary URI grant, so it's a one-tap path and
  # a safety net if the in-app list ever comes up short on a given device.
  flutter_native_contact_picker: ^0.0.12
  # Bundles country flag PNG assets (rendered in the phone country picker);
  # reliable on Android where flag emoji don't render.
  country_code_picker: ^3.4.1
  intl: ^0.20.2
  collection: ^1.19.1
  home_widget: ^0.9.3
  # Promoted from transitive: used directly by the offline bootstrap cache
  # (lib/data/cache/bootstrap_cache.dart writes to the app documents dir).
  path_provider: ^2.1.5
  # Keeps the screen awake during in-store "Shopping mode" so the list stays
  # visible while the user shops; released when leaving the screen.
  wakelock_plus: ^1.2.8
  # Android push (Phase 3 item 11). FCM tokens are registered as Appwrite push
  # targets (account.createPushTarget, provider `moona_fcm`); the backend sends
  # via Appwrite Messaging. Wired Android-only — Firebase is initialised and the
  # push provider is selected behind a `defaultTargetPlatform == android` guard
  # in main.dart, so web/desktop/tests stay on the no-op push service. iOS/APNs
  # is parked (no Apple credentials on the provider yet). google-services.json
  # lives at android/app/ and is consumed by the com.google.gms.google-services
  # Gradle plugin; no firebase_options.dart is needed for the Android-only setup.
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  # Web/PWA DOM access (localStorage in the conditional KvStore web backing, and
  # the install-prompt JS bridge). Compiled in only on the web target.
  web: ^1.1.1
  # Barcode scanning via the device camera (user scan-to-add + admin catalog
  # builder). Degrades gracefully on web (shows "not supported" message).
  mobile_scanner: ^6.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  fake_async: ^1.3.3
  flutter_launcher_icons: ^0.14.4

# App launcher icons (run: dart run flutter_launcher_icons).
# Source art is generated by tool/generate_icon.py.
flutter_launcher_icons:
  image_path: "assets/icon/moona_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1F8A5B"
  adaptive_icon_foreground: "assets/icon/moona_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/moona_icon.png"
    background_color: "#1F8A5B"
    theme_color: "#1F8A5B"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/icon/

  # Bundled variable fonts (the mockup pairing). Cairo carries Arabic + Latin,
  # Nunito is the rounded Latin face. Each is a single variable .ttf whose weight
  # axis covers the full w400–w900 range the UI uses, so no per-weight files and
  # no runtime network font fetch. Web emoji fallback shards are self-hosted
  # under web/font-fallbacks; mobile emoji still use the OS emoji font.
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito.ttf

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
