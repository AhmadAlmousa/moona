<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moona — Shared Shopping List</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400..900;1,400..800&family=Cairo:wght@400..900&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: 'Nunito','Cairo',system-ui,sans-serif; background: #15130f; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  input::placeholder { color: var(--on-surf-var); opacity: 0.55; font-weight: 600; }
  @keyframes moonaToast { from { transform: translateY(14px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes moonaCountdown { from { width: 100%; } to { width: 0%; } }
  .moona-countdown { animation: moonaCountdown 5s linear forwards; }
  .moona-root :focus-visible { outline: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data + strings (plain JS) -->
<script src="app/store.js"></script>
<script src="app/i18n.js"></script>

<!-- components (Babel JSX) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/components.jsx"></script>
<script type="text/babel" src="app/screens.jsx"></script>
<script type="text/babel" src="app/forms.jsx"></script>
<script type="text/babel" src="app/admin.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
